version: '3.8'

services:
  rag-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: julien-rag-api
    ports:
      - "8000:8000"
    volumes:
      - ../data:/home/app/data
      - ../logs:/home/app/logs
      - ../config:/home/app/config:ro
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_RELOAD=false
      - API_LOG_LEVEL=info
      # OpenAI configuration (optional - required for embeddings and RAG if using OpenAI)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # RAG configuration
      - RAG_CONFIG=config/rag.yaml
      # Admin token for refresh endpoint (set to empty to disable in production)
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      # Optional: Embedding provider configuration
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-openai}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-ada-002}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - rag-network

  # Optional: Prometheus for metrics collection and visualization
  prometheus:
    image: prom/prometheus:latest
    container_name: julien-rag-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - rag-network
    profiles:
      - monitoring

  # Optional: Grafana for metrics visualization
  grafana:
    image: grafana/grafana:latest
    container_name: julien-rag-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped
    networks:
      - rag-network
    profiles:
      - monitoring

volumes:
  prometheus_data:
  grafana_data:

networks:
  rag-network:
    driver: bridge
