# RAG Configuration
# This file defines the LLM settings for answer generation

# Choose the LLM provider: "openai" or "local"
provider: openai

# OpenAI configuration (used when provider: openai)
openai:
  model: gpt-4o
  api_key: ${OPENAI_API_KEY}  # References .env variable
  temperature: 0.7
  max_tokens: 1000
  top_p: 1.0
  frequency_penalty: 0.0
  presence_penalty: 0.0

# Local LLM configuration (used when provider: local)
# Options: ollama, llama-cpp, vllm, etc.
local:
  provider: ollama  # Options: ollama, llama_cpp, vllm
  model: llama3
  base_url: http://localhost:11434  # Ollama default
  temperature: 0.7
  max_tokens: 1000

# Generation settings
generation:
  system_prompt: |
    You are a helpful assistant that answers questions based on the provided context.
    Use the following pieces of context to answer the question at the end.
    If you don't know the answer based on the context, say so clearly.
    Do not make up information. Keep answers concise and relevant.
    Always cite your sources using the metadata provided.
  context_template: |
    Context:
    {context}

    Question: {question}

    Answer:
  max_context_length: 4000  # Maximum characters of context to include
  min_context_chunks: 3  # Minimum number of context chunks to use